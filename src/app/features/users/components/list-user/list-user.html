<div class="dashboard-container">
  <p-toast position="top-right"></p-toast>

  <div class="main-card">
    
    <div class="table-header">
      <div class="header-title">
        <h1><i class="pi pi-users"></i> لیست کاربران</h1>
        <p>مشاهده و مدیریت تمامی کاربران فعال و غیرفعال سیستم</p>
      </div>
      <div class="header-actions">
        <button pButton icon="pi pi-plus" label="کاربر جدید" class="action-btn" (click)="openNew()"></button>
        <button *ngIf="selectedUsers.length > 0" pButton icon="pi pi-trash" label="حذف انتخاب شده‌ها" class="p-button-danger" (click)="deleteSelectedUsers()"></button>
      </div>
    </div>

    <div class="filters-section">
      <div class="filters-row">
        
        <div class="filter-item search-global">
          <label>جستجوی سریع</label>
          <div class="search-with-button">
            <input 
              pInputText 
              type="text" 
              [(ngModel)]="globalSearch" 
              (keyup.enter)="onSearch()"
              placeholder="نام، نام کاربری، ایمیل ..." 
              class="w-full" />
       
          </div>
        </div>
    
        <div class="filter-item">
          <label>نقش کاربری</label>
          <p-multiSelect 
            fluid 
            [options]="roleOptions" 
            [(ngModel)]="selectedRoles" 
            optionLabel="label" 
            optionValue="value" 
            placeholder="همه نقش‌ها" 
            [showClear]="true" 
            (onChange)="onFilterChange()" 
            [filter]="true">
          </p-multiSelect>
        </div>
    
        <div class="filter-item">
          <label>وضعیت</label>
          
          <p-select 
            fluid 
            [options]="statusOptions" 
            [(ngModel)]="selectedStatus" 
            optionLabel="label" 
            placeholder="همه" 
            [showClear]="true" 
            (onChange)="onFilterChange()">
          </p-select>
        </div>
    
        <div class="filter-item filter-actions">
          <button 
          pButton 
          icon="pi pi-search" 
          class="search-btn"
          (click)="onSearch()"
          [loading]="searchLoading">
        </button>
          <button 
            pButton 
            label="پاک کردن" 
            icon="pi pi-filter-slash" 
            class="p-button-outlined" 
            (click)="clearAllFilters()">
          </button>
        </div>
      </div>
    </div>

    <p-table 
      [value]="paginatedUsers" 
      [rows]="rowsPerPage" 
      [totalRecords]="totalRecords" 
      [paginator]="true" 
      [rowHover]="true" 
      dataKey="userId" 
      [showCurrentPageReport]="true" 
      [rowsPerPageOptions]="[10,25,50]" 
      (onPage)="onPageChange($event)" 
      selectionMode="multiple" 
      [(selection)]="selectedUsers" 
      [loading]="loading">
      
      <ng-template pTemplate="caption">
        <div class="table-caption">
          <div class="total-info">
            <i class="pi pi-info-circle"></i> 
            <span>مجموع کاربران: {{ totalRecords }}</span>
          </div>
          <div class="refresh-btn" (click)="refresh()">
            <i class="pi pi-refresh"></i>
          </div>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
    
          <th pSortableColumn="fullName">نام و نام خانوادگی <p-sortIcon field="fullName"></p-sortIcon></th>
          <th pSortableColumn="userName">نام کاربری <p-sortIcon field="userName"></p-sortIcon></th>
          <th>ایمیل</th>
          <th pSortableColumn="unit">واحد/سازمان <p-sortIcon field="unit"></p-sortIcon></th>
          <th>نقش‌ها</th>
          <th pSortableColumn="isActive">وضعیت <p-sortIcon field="isActive"></p-sortIcon></th>
          <th>تاریخ ایجاد</th>
          <th style="width:80px">ویرایش</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr [class.inactive-row]="user.isActive === false">
          <td>
            <div class="user-info">
              <div class="avatar-container">
       
                <img 
                  *ngIf="user.photo; else avatarTemplate"
                  [src]="user.photo" 
                  class="user-avatar" 
                  [alt]="user.fullName" 
                />
                <ng-template #avatarTemplate>
                  <img 
                    [src]="'https://ui-avatars.com/api/?background=3b82f6&color=fff&rounded=true&size=38&name=' +(user.fullName)" 
                    class="user-avatar" 
                    [alt]="user.fullName" 
                  />
                </ng-template>
              </div>
              <span class="user-name-text">{{ user.fullName }}</span>
            </div>
          </td>
          <td><span class="user-username-text">@{{ user.userName }}</span></td>
          <td><span class="user-email-text">{{ user.email }}</span></td>
          <td>
            <div class="role-badges">
              <span *ngFor="let unit of user.unit" class="role-tag">{{unit }}</span>
            </div>
          </td>
          <td>
            <div class="role-badges">
              <span *ngFor="let role of user.role" class="role-tag">{{role }}</span>
            </div>
          </td>
    
          <td>
            <button 
            pButton
            [label]="user.isActive === true ? 'فعال' : 'غیرفعال'"
            [icon]="user.isActive === true ? 'pi pi-check-circle' : 'pi pi-ban'"
            [class]="user.isActive === true ? 'status-btn active' : 'status-btn inactive'"
            (click)="toggleUserStatus(user)"
            [loading]="statusLoading[user.userId]"
            [disabled]="statusLoading[user.userId]">
          </button>
          </td>
          <td><span class="date-text">{{ user.createdAt }}</span></td>
          <td>
            <div class="action-group">
              <button pButton icon="pi pi-pencil" class="p-button-rounded p-button-text edit-btn" (click)="editUser(user)"></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="8" class="empty-row">
            <div class="empty-content">
              <i class="pi pi-folder-open"></i>
              <p>هیچ کاربری یافت نشد</p>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
