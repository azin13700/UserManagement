<div class="children-dialog-content">
    <div class="card flex justify-center">
      <app-message-dialog
    [(visible)]="messageDialogVisible"
    [title]="messageDialogTitle"
    [message]="messageDialogMessage"
    [type]="messageDialogType"
    [loading]="messageDialogLoading"
    (onConfirm)="handleMessageConfirm()"
  ></app-message-dialog>
  
  
  <app-confirm-dialog
    [(visible)]="confirmDialogVisible"
    [title]="confirmDialogTitle"
    [message]="confirmDialogMessage"
    [loading]="confirmDialogLoading"
    [confirmSeverity]="confirmDialogSeverity"
    (onConfirm)="handleConfirm()"
    (onCancel)="confirmDialogVisible = false"
  ></app-confirm-dialog>
  
      <!-- <p-toast />
      <p-confirmdialog>
          <ng-template #message let-message>
              @if (message) {
                  <div class="flex flex-col items-center w-full gap-4 border-b border-surface-200 dark:border-surface-700">
                      <i [ngClass]="message.icon" class="!text-6xl text-primary-500"></i>
                      <p>{{ message.message }}</p>
                  </div>
              }
          </ng-template>
      </p-confirmdialog> -->
  </div>

    <div class="table-toolbar">
      <div class="toolbar-left">
        <span class="toolbar-title">
          <i class="pi pi-list"></i>
          لیست  درخواست ها
        </span>
        <span class="toolbar-count" *ngIf="listHistory.length > 0">
          {{ listHistory.length }} مورد
        </span>
      </div>
  
    </div>


  
    <div class="children-table-wrapper" >
      <table *ngIf="listHistory.length > 0; else noChildren">
        <thead>
          <tr>
            <th style="width:9%">شماره درخواست</th>
            <th style="width:30%">وضعیت</th>
            <th style="width:20%;">پاسخ‌دهنده</th>
            <th style="width:30%">متن پاسخ</th>
            <th style="width:20%;">تاریخ و زمان ثبت</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let child of listHistory" >
            <td>
              <div class="child-info">
                <i class="pi pi-file"></i>
                <span class="child-title">{{ child.requestId }}</span>
              </div>
            </td>
        
            <td>
                <span class="child-title">{{ child.lastState }}</span>
            </td>
            <td>
                <span class="child-title">{{ child.userName }}</span>

            </td>
            <td>
                <span class="child-title">{{ child.answerText }}</span>

            </td>
            <td>
                <span class="child-title">{{ child.answerDate  | shamsiDate}}</span>

            </td>
          </tr>
        </tbody>
      </table>
    </div>
  
    <!-- Empty -->
    <ng-template #noChildren>
      <div class="no-children">
        <i class="pi pi-inbox"></i>
        <!-- <p>این موضوع هیچ زیرمجموعه‌ای ندارد</p>
        <span class="empty-hint">برای افزودن زیرمجموعه، روی دکمه «افزودن زیرمجموعه» کلیک کنید</span> -->
      </div>
    </ng-template>
  
  </div>
