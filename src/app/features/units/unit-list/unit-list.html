<div class="dashboard-container">
  <div class="main-card">
    
    <div class="table-header">
      <div class="header-title">
        <h1>
          <i class="pi pi-building"></i>
          لیست واحد و سازمان‌ها
        </h1>
        <p>مشاهده و مدیریت تمامی واحدهای سازمانی</p>
      </div>

      <div class="header-actions">
        <div class="search-wrapper">
          <i class="pi pi-search"></i>
          <input
            pInputText
            type="text"
            (input)="onSearch($event)"
            [ngModel]="searchValue"
            placeholder="جستجوی واحد..."
          />
        </div>

        <button
          pButton
          icon="pi pi-plus"
          label="واحد جدید"
          class="action-btn"
          (click)="openNew()"
        ></button>
      </div>
    </div>

    <p-table 
      [value]="getPaginatedUnits()"
      [rows]="rowsPerPage" 
      [totalRecords]="totalRecords" 
      [paginator]="true" 
      [rowHover]="true" 
      dataKey="unitId" 
      [showCurrentPageReport]="true" 
      [rowsPerPageOptions]="[10,25,50]" 
      (onPage)="onPageChange($event)" 
      selectionMode="multiple" 
      [(selection)]="selectedUnits" 
      [loading]="loading"
    >
      
      <ng-template pTemplate="caption">
        <div class="table-caption">
          <div class="total-info">
            <i class="pi pi-info-circle"></i> 
            <span>مجموع واحدها: {{ totalRecords }}</span>
          </div>
          <div class="refresh-btn" (click)="refresh()">
            <i class="pi pi-refresh"></i>
          </div>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
        
          <th pSortableColumn="name">نام واحد <p-sortIcon field="name"></p-sortIcon></th>
          <th pSortableColumn="description">توضیحات <p-sortIcon field="description"></p-sortIcon></th>
          <th pSortableColumn="isActive">وضعیت <p-sortIcon field="isActive"></p-sortIcon></th>
          <th pSortableColumn="userCount">تعداد کاربران <p-sortIcon field="userCount"></p-sortIcon></th>
          <th style="width:80px">ویرایش</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-unit>
        <tr [class.inactive-row]="unit.isActive === false">
 >
          <td>
            <span class="unit-name-text">{{ unit.name }}</span>
          </td>

          <td>
            <span class="unit-desc-text">{{ unit.description || '-' }}</span>
          </td>

          <td>
            <button 
              pButton
              [label]="unit.isActive ? 'فعال' : 'غیرفعال'"
              [icon]="unit.isActive ? 'pi pi-check-circle' : 'pi pi-ban'"
              [class]="unit.isActive ? 'status-btn active' : 'status-btn inactive'"
              (click)="toggleUnitStatus(unit)"
              [loading]="statusLoading[unit.unitId]"
              [disabled]="statusLoading[unit.unitId]"
            ></button>
          </td>

          <td>
            <span class="user-count-badge">
              <i class="pi pi-users"></i>
              {{ unit.userCount || 0 }}
            </span>
          </td>

          <td>
            <div class="action-group">
              <button 
                pButton 
                icon="pi pi-pencil" 
                class="p-button-rounded p-button-text edit-btn" 
                (click)="editUnit(unit)"
                pTooltip="ویرایش واحد"
              ></button>
         
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="empty-row">
            <div class="empty-content">
              <i class="pi pi-folder-open"></i>
              <p>هیچ واحدی یافت نشد</p>
            </div>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>
</div>
