<div class="dashboard-container">

<app-message-dialog
  [(visible)]="messageDialogVisible"
  [title]="messageDialogTitle"
  [message]="messageDialogMessage"
  [type]="messageDialogType"
  [loading]="messageDialogLoading"
  (onConfirm)="handleMessageConfirm()"
></app-message-dialog>


<app-confirm-dialog
  [(visible)]="confirmDialogVisible"
  [title]="confirmDialogTitle"
  [message]="confirmDialogMessage"
  [loading]="confirmDialogLoading"
  [confirmSeverity]="confirmDialogSeverity"
  (onConfirm)="handleConfirm()"
  (onCancel)="confirmDialogVisible = false"
></app-confirm-dialog>

  <div class="main-card">
    

    <div class="table-header">
      <div class="header-title">
        <h1>
          <i class="pi pi-sitemap"></i>
          مدیریت واحدهای سازمانی
        </h1>
        <p>مشاهده و مدیریت ساختار سازمانی به صورت درختی</p>
      </div>

      <div class="header-actions">
        <div class="search-wrapper">
          <i class="pi pi-search"></i>
          <input
            pInputText
            type="text"
            [(ngModel)]="searchValue"
            (input)="onSearch($event)"
            placeholder="جستجوی واحد..."
          />
        </div>

        <button
          (click)="openNew()"
          pButton
          icon="pi pi-plus"
          label="واحد جدید"
          class="action-btn"
        ></button>
      </div>
    </div>


    <p-treetable 
      [value]="treeData" 
      [columns]="columns"
      [tableStyle]="{ 'min-width': '50rem' }"
      [loading]="loading"
      [paginator]="true"
      [rows]="10"
      [totalRecords]="totalRecords"
      [rowsPerPageOptions]="[10,25,50]"
    >
      

      <ng-template #caption>
        <div class="tree-caption">
          <div class="caption-info">
            <i class="pi pi-info-circle"></i>
            <span>ساختار سازمانی - مجموع: {{ totalRecords }} واحد</span>
          </div>
        </div>
      </ng-template>


      <ng-template #header let-columns>
        <tr>
          <th *ngFor="let col of columns; let last ">
            {{ col.header }}
          </th>
        </tr>
      </ng-template>


      <ng-template #body let-rowNode let-rowData="rowData" let-columns="columns">
        <tr [ttRow]="rowNode" [class.inactive-row]="!rowData.isActive">
          
  
          <td>
            <div class="flex items-center gap-2">
              <p-treetable-toggler [rowNode]="rowNode" />
              <i class="pi pi-folder" [style.color]="rowData.isActive ? '#f59e0b' : '#94a3b8'"></i>
              <span class="unit-name">{{ rowData.name }}</span>
              @if (rowData.parentId === null || rowData.parentId === 0) {
                <span class="root-badge">ریشه</span>
              }
            </div>
          </td>

 
          <td>
            <span class="user-count-badge">
              <i class="pi pi-users"></i>
              {{ rowData.userCount || 0 }}
            </span>
          </td>


          <td>
            <button 
              pButton
              [label]="rowData.isActive ? 'فعال' : 'غیرفعال'"
              [icon]="rowData.isActive ? 'pi pi-check-circle' : 'pi pi-ban'"
              [class]="rowData.isActive ? 'status-btn active' : 'status-btn inactive'"
              (click)="toggleStatus(rowData)"
              [loading]="statusLoading[rowData.unitId]"
              [disabled]="statusLoading[rowData.unitId]"
            ></button>
          </td>

         
          <td>
            <div class="action-group">
              <button 
                pButton 
                icon="pi pi-pencil" 
                class="p-button-rounded p-button-text edit-btn" 
                (click)="editUnit(rowData)"
                pTooltip="ویرایش"
              ></button>
            </div>
          </td>

       
          <td>
            <div class="action-group">
              <button 
                pButton 
                icon="pi pi-plus" 
                class="p-button-rounded p-button-text add-child-btn" 
                (click)="addChild(rowData)"
                pTooltip="افزودن زیرمجموعه"
              ></button>
            </div>
          </td>

        </tr>
      </ng-template>

      <!-- Empty -->
      <ng-template #emptymessage>
        <tr>
          <td colspan="6" class="empty-row">
            <div class="empty-content">
              <i class="pi pi-folder-open"></i>
              <p>هیچ واحدی یافت نشد</p>
            </div>
          </td>
        </tr>
      </ng-template>

      <!-- Summary -->
      <ng-template #summary>
        <div class="tree-summary">
          <button 
            pButton 
            icon="pi pi-refresh" 
            label="بروزرسانی" 
            class="refresh-btn"
            (click)="refresh()"
          ></button>
        </div>
      </ng-template>

    </p-treetable>
  </div>
</div>
