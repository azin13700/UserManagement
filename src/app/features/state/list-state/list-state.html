<div class="permission-container">
    <app-message-dialog
    [(visible)]="messageDialogVisible"
    [title]="messageDialogTitle"
    [message]="messageDialogMessage"
    [type]="messageDialogType"
    [loading]="messageDialogLoading"
    (onConfirm)="handleMessageConfirm()"
  ></app-message-dialog>
  
  
  <app-confirm-dialog
    [(visible)]="confirmDialogVisible"
    [title]="confirmDialogTitle"
    [message]="confirmDialogMessage"
    [loading]="confirmDialogLoading"
    [confirmSeverity]="confirmDialogSeverity"
    (onConfirm)="handleConfirm()"
    (onCancel)="confirmDialogVisible = false"
  ></app-confirm-dialog>
  
    <div class="card">
      
      <div class="table-header">
        <div class="header-title">
          <h1><i class="pi pi-key"></i> مدیریت وضعیت ها</h1>
          <p>مدیریت و تعریف وضعیت های سیستم</p>
        </div>
        <div class="header-actions">
          <button pButton icon="pi pi-plus" label="وضعیت جدید" class="action-btn" (click)="openNew()"></button>
        </div>
      </div>
  
      <div class="filters-section">
        <div class="filters-row">
          <div class="filter-item search-global">
            <input pInputText type="text" [(ngModel)]="searchValue" placeholder="جستجوی وضعیت ها..." />
          </div>
          <div class="filter-item">
            <!-- <p-select
              [options]="categories"
              [(ngModel)]="selectedCategory"
              placeholder="همه دسته‌بندی‌ها"
              [showClear]="true"
              (onChange)="selectedCategory = $event.value"
            ></p-select> -->
          </div>
          <div class="filter-item filter-actions">
            <button pButton label="پاک کردن" icon="pi pi-filter-slash" class="p-button-outlined" (click)="searchValue=''; selectedCategory=null"></button>
          </div>
        </div>
      </div>
  
      <p-table
        [value]="permissions"
        [rows]="10"
        [paginator]="true"
        [rowHover]="true"
        dataKey="id"
        [showCurrentPageReport]="true"
        [rowsPerPageOptions]="[10,25,50]"
        [loading]="loading"
      >
        <ng-template pTemplate="header">
          <tr>
            <th pSortableColumn="stateCaption">عنوان نمایشی وضعیت <p-sortIcon field="stateCaption"></p-sortIcon></th>
            <th pSortableColumn="isEnable">فعال/غیرفعال <p-sortIcon field="isEnable"></p-sortIcon></th>
            <th style="width:100px">ویرایش</th>
          </tr>
        </ng-template>
  
        <ng-template pTemplate="body" let-perm>
          <tr>
            <td><span class="perm-category">{{ perm.stateCaption }}</span></td>

            <td>
              <p-tag
                [severity]="perm.isEnable ? 'success' : 'danger'"
                [value]="perm.isEnable ? 'فعال' : 'غیرفعال'"
              ></p-tag>
            </td>
            <td>
              <div class="action-group">
                <button pButton icon="pi pi-pencil" class="p-button-rounded p-button-text" (click)="editPermission(perm)"></button>
              </div>
            </td>
          </tr>
        </ng-template>
  
        <ng-template pTemplate="emptymessage">
          <tr><td colspan="6" class="empty-row">هیچ دسترسی یافت نشد</td></tr>
        </ng-template>
      </p-table>
    </div>
  </div>
  
  <p-dialog
    [(visible)]="dialogVisible"
    [header]="isEditMode ? 'ویرایش وضعیت' : 'ایجاد وضعیت'"
    [modal]="true"
    [style]="{width: '600px', maxWidth: '95vw'}"
    [draggable]="false"
  >
    <div class="dialog-content">
  
  
      <div class="field">
        <label>عنوان وضعیت <span class="required">*</span></label>
        <input pInputText [(ngModel)]="currentPermission.stateCaption"  placeholder="مثال: درخواست ثبت شد" class="w-full" />
  
      </div>
      <div class="field">
        <label> توضیحات  <span class="required">*</span></label>
        <textarea pInputTextarea [(ngModel)]="currentPermission.stateName" rows="3" [autoResize]="true" class="w-full"></textarea>

      </div>
 
  

    </div>
  
    <ng-template pTemplate="footer">
      <div class="dialog-footer">
        <button pButton label="انصراف" icon="pi pi-times" class="p-button-outlined" (click)="dialogVisible = false"></button>
        <button pButton label=" ذخیره وضعیت" icon="pi pi-save" [loading]="loading" (click)="savePermission()"></button>
      </div>
    </ng-template>
  </p-dialog>
