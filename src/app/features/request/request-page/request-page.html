<div class="request-container">
  <!-- دیالوگ پیام -->
  <app-message-dialog
    [(visible)]="messageDialogVisible"
    [title]="messageDialogTitle"
    [message]="messageDialogMessage"
    [type]="messageDialogType"
    [loading]="messageDialogLoading"
    (onConfirm)="handleMessageConfirm()"
  ></app-message-dialog>

  <!-- دیالوگ تایید -->
  <app-confirm-dialog
    [(visible)]="confirmDialogVisible"
    [title]="confirmDialogTitle"
    [message]="confirmDialogMessage"
    [loading]="confirmDialogLoading"
    [confirmSeverity]="confirmDialogSeverity"
    (onConfirm)="handleConfirm()"
    (onCancel)="confirmDialogVisible = false"
  ></app-confirm-dialog>

  <div class="request-card">
    <div class="form-header">
      <div class="form-header-icon">
        <i class="pi pi-clipboard"></i>
      </div>
      <div class="form-header-title">
        <h1>ثبت درخواست جدید</h1>
        <p>لطفاً اطلاعات درخواست خود را تکمیل کنید</p>
      </div>
    </div>

    <form (ngSubmit)="submit()" [formGroup]="requestForm" class="request-form">
      
      <!-- موضوع -->
      <div class="form-group">
        <label for="subject">
          موضوع <span class="required">*</span>
        </label>
        <div class="input-wrapper">
          <p-select
          fluid 
          [options]="subjects"
          
          optionLabel="title"
          
          optionValue="subjectId"
          
          formControlName="subjectId"
          
          (onChange)="onSubjectChange($event)">
          
          </p-select>
        </div>
      </div>

      <!-- زیرموضوع -->
      <div class="form-group">
        <label for="subSubject">
          زیرموضوع <span class="required">*</span>
        </label>
        <div class="input-wrapper">
          <p-select
          fluid 
          [options]="subSubjects"
          
          optionLabel="title"
          
          optionValue="subjectId"
          
          formControlName="subSubjectId">
          
          </p-select>
        </div>
      </div>

      <!-- متن درخواست -->
      <div class="form-group">
        <label for="description">
          متن درخواست <span class="required">*</span>
        </label>
        <div class="input-wrapper textarea-wrapper">
          <textarea
            formControlName="description"
            id="description"
            pInputTextarea
            fluid
            rows="5"
            size="small"
            [autoResize]="true"
            placeholder="متن درخواست خود را با جزئیات کامل وارد کنید..."
            class="w-full"
            name="description"
          ></textarea>
        </div>
      </div>

      <!-- واحد متولی -->
      <div class="form-group">
        <label for="unit">
          واحد متولی <span class="required">*</span>
        </label>
        <div class="input-wrapper">
          <div class="tree-select-wrapper">
            <p-treeselect
            [options]="unitNodes"
            [(ngModel)]="selectedUnitKey"
            [ngModelOptions]="{ standalone: true }"
            placeholder="انتخاب واحد"
            [filter]="true">
        </p-treeselect>
            
        
          </div>
        </div>
      </div>

      <!-- عکس -->
      <div class="form-group">
        <label>عکس (اختیاری)</label>
        <div class="photo-section">
          <div class="photo-preview" *ngIf="imagePreview">
            <img [src]="imagePreview" alt="عکس درخواست" style="height: 200px; width: 200px;">
            <button type="button" class="remove-photo" (click)="removeImage()">
              <i class="pi pi-times"></i>
            </button>
          </div>
          <div class="avatar-section">
            <p-fileUpload 
              mode="basic"
              name="photo"
              accept="image/*"
              chooseLabel="انتخاب عکس"
              chooseIcon="pi pi-camera"
              (onSelect)="onFileSelected($event)"
              [auto]="true"
              [maxFileSize]="2000000"
            >
            </p-fileUpload>
            <small class="upload-hint">حداکثر 2 مگابایت | فرمت‌های مجاز: JPG, PNG</small>
          </div>
        </div>
      </div>

      <!-- دکمه‌ها -->
      <div class="form-actions">
        <button
          type="button"
          pButton
          label="انصراف"
          icon="pi pi-times"
          class="p-button-outlined cancel-btn"
          (click)="reset()"
        ></button>
        <button
          type="submit"
          pButton
          [label]="isEditMode ? 'ویرایش درخواست' : 'ثبت درخواست'"
          [icon]="isEditMode ? 'pi pi-pencil' : 'pi pi-save'"
          [loading]="loading"
          class="submit-btn"
        ></button>
      </div>

    </form>
  </div>
</div>
