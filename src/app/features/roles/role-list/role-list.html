<div class="dashboard-container">
  <app-message-dialog
  [(visible)]="messageDialogVisible"
  [title]="messageDialogTitle"
  [message]="messageDialogMessage"
  [type]="messageDialogType"
  [loading]="messageDialogLoading"
  (onConfirm)="handleMessageConfirm()"
></app-message-dialog>


<app-confirm-dialog
  [(visible)]="confirmDialogVisible"
  [title]="confirmDialogTitle"
  [message]="confirmDialogMessage"
  [loading]="confirmDialogLoading"
  [confirmSeverity]="confirmDialogSeverity"
  (onConfirm)="handleConfirm()"
  (onCancel)="confirmDialogVisible = false"
></app-confirm-dialog>

  <div class="main-card">
    
    <div class="table-header">
      <div class="header-title">
        <h1>
          <i class="pi pi-shield"></i>
          لیست نقش‌ها
        </h1>
        <p>مشاهده و مدیریت تمامی نقش‌های سیستم</p>
      </div>

      <div class="header-actions">
        <div class="search-wrapper">
          <i class="pi pi-search"></i>
          <input
            pInputText
            type="text"
            (input)="onSearch($event)"
            [ngModel]="searchValue"
            placeholder="جستجوی نقش..."
          />
        </div>

        <button
          pButton
          icon="pi pi-plus"
          label="نقش جدید"
          class="action-btn"
          (click)="openNew()"
        ></button>
      </div>
    </div>

    <p-table 
      [value]="roles"
      [rows]="rowsPerPage" 
      [totalRecords]="totalRecords" 
      [paginator]="true" 
      [rowHover]="true" 
      dataKey="roleId" 
      [showCurrentPageReport]="true" 
      [rowsPerPageOptions]="[10,25,50]" 
      (onPage)="onPageChange($event)" 
      selectionMode="multiple" 
      [(selection)]="selectedRoles" 
      [loading]="loading"
    >
      
      <ng-template pTemplate="caption">
        <div class="table-caption">
          <div class="total-info">
            <i class="pi pi-info-circle"></i> 
            <span>مجموع نقش‌ها: {{ totalRecords }}</span>
          </div>
          <div class="refresh-btn" (click)="refresh()">
            <i class="pi pi-refresh"></i>
          </div>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
        
          <th pSortableColumn="roleName">نام نقش <p-sortIcon field="roleName"></p-sortIcon></th>
          <th pSortableColumn="description">توضیحات <p-sortIcon field="description"></p-sortIcon></th>
          <th>دسترسی‌ها</th>
          <th pSortableColumn="isActive">وضعیت <p-sortIcon field="isActive"></p-sortIcon></th>
          <th style="width:80px">تخصیص دسترسی</th>
          <th style="width:80px">تخصیص وضعیت</th>
          <th style="width:260px">تخصیص وضعبتهای قابل مشاهده</th>
          <th style="width:80px">ویرایش</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-role>
        <tr [class.inactive-row]="role.isActive === false">
      

          <td>
            <span class="role-name-text">{{ role.roleName }}</span>
          </td>

          <td>
            <span class="role-desc-text">{{ role.description || '-' }}</span>
          </td>

          <td>
            <div class="permission-badges">
              <span *ngFor="let perm of role.permissions" class="permission-tag">
                {{ perm }}
              </span>
              <span *ngIf="!role.permissions || role.permissions.length === 0" class="permission-tag empty">
                بدون دسترسی
              </span>
            </div>
          </td>

          <td>
            <button 
              pButton
              [label]="role.isActive ? 'فعال' : 'غیرفعال'"
              [icon]="role.isActive ? 'pi pi-check-circle' : 'pi pi-ban'"
              [class]="role.isActive ? 'status-btn active' : 'status-btn inactive'"
              (click)="toggleRoleStatus(role)"
              [loading]="statusLoading[role.roleId]"
              [disabled]="statusLoading[role.roleId]"
            ></button>
          </td>

          <td>
            <div class="action-group">
              <button 
                pButton 
                icon="pi pi-key" 
                class="p-button-rounded p-button-text assign-btn" 
                (click)="assignPermissions(role)"
                pTooltip="تخصیص دسترسی"
              ></button>
            </div>
          </td>
          <td>
            <div class="action-group">
              <button 
                pButton 
                icon="pi pi-sitemap" 
                class="p-button-rounded p-button-text assign-btn" 
                (click)="assignStatus(role)"
               
              ></button>
            </div>
          </td>
          <td>
            <div class="action-group">
              <button 
                pButton 
                icon="pi pi-sitemap" 
                class="p-button-rounded p-button-text assign-btn" 
                (click)="assignStateIn(role)"
               
              ></button>
            </div>
          </td>
          <td>
            <div class="action-group">
              <button 
                pButton 
                icon="pi pi-pencil" 
                class="p-button-rounded p-button-text edit-btn" 
                (click)="editRole(role)"
                pTooltip="ویرایش نقش"
              ></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7" class="empty-row">
            <div class="empty-content">
              <i class="pi pi-folder-open"></i>
              <p>هیچ نقشی یافت نشد</p>
            </div>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>
</div>
