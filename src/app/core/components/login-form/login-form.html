<div class="login-wrapper">
  <div class="login-card">
    
    <div class="brand">
      <div class="logo">
        <i class="pi pi-building"></i>
      </div>
      <h1>سامانه مدیریت</h1>
      <p class="subtitle">وارد حساب کاربری خود شوید</p>
   
    </div>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="login-form">
      
      <div class="form-group">
        <label for="userName">نام کاربری <span class="required">*</span></label>
        <div class="input-wrapper">
          <span class="input-icon">
            <i class="pi pi-user"></i>
          </span>
          <input
            id="userName"
            type="text"
            formControlName="userName"
            placeholder="نام کاربری خود را وارد کنید"
            [class.ng-invalid]="isInvalid('userName')"
            autocomplete="userName"
          />
        </div>
        <div class="error-message" *ngIf="isInvalid('userName')">
          <i class="pi pi-exclamation-circle"></i>
          نام کاربری الزامی است
        </div>
      </div>

      <div class="password-group">
        <label for="password">رمز عبور <span class="required">*</span></label>
        <div class="password-wrapper" [class.has-error]="isInvalid('password')">
          <span class="input-icon">
            <i class="pi pi-lock"></i>
          </span>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="رمز عبور خود را وارد کنید"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-btn"
            (click)="showPassword = !showPassword"
          >
            <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
          </button>
        </div>
        <div class="error-message" *ngIf="isInvalid('password')">
          <i class="pi pi-exclamation-circle"></i>
          رمز عبور الزامی است (حداقل 6 کاراکتر)
        </div>
      </div>

      <div class="options-row">
        <label class="remember">
          <input type="checkbox" formControlName="rememberMe" />
          مرا به خاطر بسپار
        </label>
        <a href="#" class="forgot">فراموشی رمز عبور؟</a>
      </div>

      <button
        type="submit"
        class="btn-login"
        [disabled]="userForm.invalid || loading"
      >
        <span >
          <i class="pi pi-sign-in"></i>
          ورود به سامانه
        </span>
       
      </button>

    </form>
  </div>
</div>
